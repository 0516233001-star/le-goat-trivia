<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Trivia Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Sports Trivia Challenge</h1>
            <div class="score-info">
                <span id="question-number">Question 1 of 30</span>
                <span id="score">Score: 0/30</span>
            </div>
        </header>
        
        <div class="question-container">
            <h2 id="question-text">Question will appear here</h2>
        </div>
        
        <div class="answers-container">
            <button class="answer-btn" id="answer-a">A) Answer A</button>
            <button class="answer-btn" id="answer-b">B) Answer B</button>
            <button class="answer-btn" id="answer-c">C) Answer C</button>
            <button class="answer-btn" id="answer-d">D) Answer D</button>
        </div>
        
        <div class="feedback" id="feedback"></div>
        
        <button id="next-btn" class="next-btn">Next Question</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
